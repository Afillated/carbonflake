format = """

[ уұ„… ](bg:{{color5}} fg:{{background}})\
[оӮҙ](bg:{{color3}} fg:{{color5}})\
$directory\
[оӮҙ](fg:{{color3}} bg:{{color5}})\
$git_branch\
$git_status\
$nix_shell\
$rust\
[оӮҙ](fg:{{color5}} bg:#212121)\
$time\
$cmd_duration\
[оӮҙ ](fg:#212121)\
\n$character"""

[directory]
style = "fg:{{foreground | lighten(0.4)}} bg:{{color3}}"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вҖҰ/"

[directory.substitutions]
"Documents" = "у°Ҳҷ "
"Downloads" = "пҖҷ "
"Music" = "пҖҒ "
"Pictures" = "пҖҫ "

[git_branch]
symbol = "оңҘ"
style = "bg:{{color5}}"
format = '[[ $symbol $branch ](fg:{{background}} bg:{{color5}})]($style)'

[git_status]
style = "bg:{{color5}}"
format = '[[($all_status$ahead_behind )](fg:{{background}} bg:{{color5}})]($style)'

[nix_shell]
disabled = false
symbol = "пӢң"
format = '[ via $symbol $state( \($name\))](fg:{{background}} bg:{{color5}})'

[rust]
symbol = "оһЁ"
style = "bg:{{color5}}"
format = '[[ $symbol ($version) ](fg:{{background}} bg:{{color5}})]($style)'

[lua]
symbol = "у°ўұ"
style = "bg:{{color5}}"
format = '[[ $symbol ($version) ](fg:{{background}} bg:{{color5}})]($style)'

[time]
disabled = false
time_format = "%R" 
style = "bg:#212121"
format = '[[ $time ](fg:{{color4}} bg:#212121)]($style)'

[cmd_duration]
min_time = 500
show_notifications = true
min_time_to_notify = 600000
style = "fg:{{color4}} bg:#212121"
format = '[уұ«җ $duration]($style)'
